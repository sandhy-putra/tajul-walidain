
<style>
*{box-sizing:border-box;margin:0;padding:0}
#app{padding:0.75rem 0;font-family:var(--font-sans);font-size:13px}
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.section-label{font-size:11px;font-weight:600;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}

/* PDF VIEWER */
.pdf-wrap{border:0.5px solid var(--color-border-secondary);border-radius:10px;overflow:hidden;margin-bottom:12px;background:var(--color-background-secondary)}
.pdf-toolbar{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary);flex-wrap:wrap}
.pdf-toolbar button{font-size:11px;padding:3px 9px;border-radius:5px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
.pdf-toolbar button:hover{background:var(--color-background-secondary)}
.pdf-toolbar button:disabled{opacity:0.4;cursor:default}
.pdf-toolbar span{font-size:11px;color:var(--color-text-secondary)}
.pdf-toolbar label.upload-btn{font-size:11px;padding:3px 11px;border-radius:5px;border:0.5px solid var(--color-border-secondary);background:#185FA5;color:#fff;cursor:pointer;white-space:nowrap}
.pdf-toolbar label.upload-btn:hover{background:#1a4f8a}
#pdfFileInput{display:none}
.pdf-zoom{display:flex;align-items:center;gap:4px;margin-left:auto}
.pdf-zoom button{padding:2px 7px}
.pdf-zoom span{font-size:11px;min-width:36px;text-align:center;color:var(--color-text-secondary)}

.pdf-canvas-wrap{overflow:auto;max-height:480px;background:#525659;display:flex;justify-content:center;align-items:flex-start;padding:12px}
#pdfCanvas{display:block;box-shadow:0 2px 12px rgba(0,0,0,0.4);border-radius:2px}
.pdf-empty{text-align:center;padding:40px 20px;color:var(--color-text-tertiary);font-size:13px}
.pdf-empty .icon{font-size:36px;margin-bottom:8px;opacity:0.4}

/* CANVAS */
.canvas-wrap{border:0.5px solid var(--color-border-secondary);border-radius:10px;background:#fff;margin-bottom:12px;overflow:hidden}
.canvas-toolbar{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:0.5px solid var(--color-border-tertiary);flex-wrap:wrap;background:var(--color-background-secondary)}
.canvas-toolbar label{font-size:11px;color:var(--color-text-secondary)}
.canvas-toolbar input[type=color]{width:24px;height:24px;border:0.5px solid var(--color-border-secondary);border-radius:4px;cursor:pointer;padding:1px}
.canvas-toolbar input[type=range]{width:70px}
.canvas-toolbar button{font-size:11px;padding:3px 9px;border-radius:5px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
.canvas-toolbar button:hover{background:var(--color-background-secondary)}
#drawCanvas{display:block;width:100%;cursor:crosshair;touch-action:none;background:#fff}

/* ANSWER */
.controls{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.controls label{font-size:12px;color:var(--color-text-secondary)}
.controls input[type=number]{width:52px;font-size:12px;padding:3px 6px;border:0.5px solid var(--color-border-secondary);border-radius:6px;background:var(--color-background-primary);color:var(--color-text-primary)}
.controls button{font-size:12px;padding:4px 11px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
.controls button:hover{background:var(--color-background-secondary)}
.legend{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-secondary)}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.answer-section{display:grid;grid-template-columns:repeat(10,1fr);gap:5px}
@media(max-width:600px){.answer-section{grid-template-columns:repeat(5,1fr)}}
.answer-group{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:7px;padding:5px 5px 4px}
.qnum{font-size:10px;color:var(--color-text-secondary);margin-bottom:4px;font-weight:500}
.opts{display:flex;gap:3px;flex-wrap:wrap}
.opt-btn{width:24px;height:24px;border-radius:50%;font-size:11px;font-weight:600;cursor:pointer;transition:transform 0.1s;flex-shrink:0}
.opt-btn:active{transform:scale(0.85)}
.info-bar{display:flex;gap:14px;margin-top:10px;font-size:12px;color:var(--color-text-secondary);flex-wrap:wrap;padding-top:8px;border-top:0.5px solid var(--color-border-tertiary)}
.info-bar span b{color:var(--color-text-primary);font-weight:500}
</style>

<div id="app">
  <h2 class="sr-only">Lembar jawaban dengan PDF viewer dan kanvas</h2>

  <!-- PDF VIEWER -->
  <div class="section-label">📄 Preview Soal (PDF)</div>
  <div class="pdf-wrap">
    <div class="pdf-toolbar">
      <label class="upload-btn" for="pdfFileInput">⬆ Upload PDF</label>
      <input type="file" id="pdfFileInput" accept="application/pdf">
      <button id="prevPage" disabled>◀ Prev</button>
      <span id="pageInfo">–</span>
      <button id="nextPage" disabled>Next ▶</button>
      <div class="pdf-zoom">
        <button id="zoomOut" disabled>−</button>
        <span id="zoomLevel">100%</span>
        <button id="zoomIn" disabled>+</button>
      </div>
    </div>
    <div class="pdf-canvas-wrap" id="pdfCanvasWrap">
      <div class="pdf-empty">
        <div class="icon">📄</div>
        Upload file PDF soal kamu di atas
      </div>
    </div>
  </div>

  <!-- CORET-CORETAN -->
  <div class="section-label">✏️ Coret-coretan</div>
  <div class="canvas-wrap">
    <div class="canvas-toolbar">
      <label>Warna</label>
      <input type="color" id="penColor" value="#1d4ed8">
      <label>Tebal</label>
      <input type="range" id="penSize" min="1" max="20" value="2">
      <span id="sizeVal" style="font-size:11px;width:16px;color:var(--color-text-secondary)">2</span>
      <button id="eraserBtn">Penghapus</button>
      <button id="clearCanvasBtn">Hapus Semua</button>
    </div>
    <canvas id="drawCanvas" height="150"></canvas>
  </div>

  <!-- LEMBAR JAWABAN -->
  <div class="section-label">📝 Lembar Jawaban</div>
  <div class="controls">
    <label>Soal:</label>
    <input type="number" id="numQ" value="50" min="1" max="200">
    <label>Opsi:</label>
    <input type="number" id="numOpts" value="4" min="2" max="6">
    <button id="generateBtn">Generate</button>
    <button id="resetBtn">Reset</button>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="dot" style="background:#e5e7eb;border:1px solid #ccc"></div>Belum</div>
    <div class="legend-item"><div class="dot" style="background:#185FA5"></div>Yakin (1x)</div>
    <div class="legend-item"><div class="dot" style="background:#7c3aed"></div>Ragu ke-2 (2x)</div>
    <div class="legend-item"><div class="dot" style="background:#b45309"></div>Ragu ke-3 (3x)</div>
    <div class="legend-item" style="font-size:10px">(4x = batal)</div>
  </div>
  <div class="answer-section" id="answerGrid"></div>
  <div class="info-bar">
    <span>Yakin: <b id="answeredCount">0</b></span>
    <span>Ragu-ragu: <b id="doubtCount">0</b></span>
    <span>Belum: <b id="unansweredCount">50</b></span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
// ── PDF.js setup ──
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
let pdfDoc=null,pdfPage=1,pdfZoom=1.2;

const pdfCanvasWrap=document.getElementById('pdfCanvasWrap');
const pageInfo=document.getElementById('pageInfo');
const prevBtn=document.getElementById('prevPage');
const nextBtn=document.getElementById('nextPage');
const zoomInBtn=document.getElementById('zoomIn');
const zoomOutBtn=document.getElementById('zoomOut');
const zoomLevel=document.getElementById('zoomLevel');

document.getElementById('pdfFileInput').addEventListener('change',async e=>{
  const file=e.target.files[0];
  if(!file)return;
  const buf=await file.arrayBuffer();
  pdfDoc=await pdfjsLib.getDocument({data:buf}).promise;
  pdfPage=1;
  renderPage();
  [prevBtn,nextBtn,zoomInBtn,zoomOutBtn].forEach(b=>b.disabled=false);
});

async function renderPage(){
  const page=await pdfDoc.getPage(pdfPage);
  const vp=page.getViewport({scale:pdfZoom});
  let canvas=pdfCanvasWrap.querySelector('canvas');
  if(!canvas){
    pdfCanvasWrap.innerHTML='';
    canvas=document.createElement('canvas');
    canvas.id='pdfCanvas';
    pdfCanvasWrap.appendChild(canvas);
  }
  canvas.width=vp.width;canvas.height=vp.height;
  await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
  pageInfo.textContent=`Hal ${pdfPage} / ${pdfDoc.numPages}`;
  prevBtn.disabled=pdfPage<=1;
  nextBtn.disabled=pdfPage>=pdfDoc.numPages;
  zoomLevel.textContent=Math.round(pdfZoom*100)+'%';
}

prevBtn.addEventListener('click',()=>{if(pdfPage>1){pdfPage--;renderPage();}});
nextBtn.addEventListener('click',()=>{if(pdfPage<pdfDoc.numPages){pdfPage++;renderPage();}});
zoomInBtn.addEventListener('click',()=>{pdfZoom=Math.min(3,pdfZoom+0.2);renderPage();});
zoomOutBtn.addEventListener('click',()=>{pdfZoom=Math.max(0.5,pdfZoom-0.2);renderPage();});

// ── Drawing canvas ──
const canvas=document.getElementById('drawCanvas');
const ctx=canvas.getContext('2d');
let drawing=false,eraser=false,lastX=0,lastY=0;
function resizeCanvas(){
  const w=canvas.parentElement.clientWidth;
  const tmp=ctx.getImageData(0,0,canvas.width,canvas.height);
  canvas.width=w;ctx.putImageData(tmp,0,0);
}
resizeCanvas();window.addEventListener('resize',resizeCanvas);
function getPos(e){const r=canvas.getBoundingClientRect();const s=e.touches?e.touches[0]:e;return[s.clientX-r.left,s.clientY-r.top];}
function startDraw(e){e.preventDefault();drawing=true;[lastX,lastY]=getPos(e);}
function doDraw(e){
  if(!drawing)return;e.preventDefault();
  const[x,y]=getPos(e);
  ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(x,y);
  ctx.strokeStyle=eraser?'#ffffff':document.getElementById('penColor').value;
  ctx.lineWidth=parseInt(document.getElementById('penSize').value)*(eraser?6:1);
  ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
  [lastX,lastY]=[x,y];
}
function stopDraw(){drawing=false;}
canvas.addEventListener('mousedown',startDraw);canvas.addEventListener('mousemove',doDraw);
canvas.addEventListener('mouseup',stopDraw);canvas.addEventListener('mouseleave',stopDraw);
canvas.addEventListener('touchstart',startDraw,{passive:false});canvas.addEventListener('touchmove',doDraw,{passive:false});
canvas.addEventListener('touchend',stopDraw);
document.getElementById('penSize').addEventListener('input',e=>{document.getElementById('sizeVal').textContent=e.target.value;});
document.getElementById('eraserBtn').addEventListener('click',function(){
  eraser=!eraser;this.textContent=eraser?'Pena':'Penghapus';canvas.style.cursor=eraser?'cell':'crosshair';
});
document.getElementById('clearCanvasBtn').addEventListener('click',()=>ctx.clearRect(0,0,canvas.width,canvas.height));

// ── Answer grid ──
const ALPHA='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const STATES=[
  {bg:'#e5e7eb',color:'#555',border:'1px solid #ccc'},
  {bg:'#185FA5',color:'#fff',border:'1px solid #185FA5'},
  {bg:'#7c3aed',color:'#fff',border:'1px solid #6d28d9'},
  {bg:'#b45309',color:'#fff',border:'1px solid #92400e'},
];
let answers={},numQ=50,numOpts=4;
function applyBtnStyle(btn,state){const s=STATES[state]||STATES[0];btn.style.background=s.bg;btn.style.color=s.color;btn.style.border=s.border;}
function buildGrid(){
  const grid=document.getElementById('answerGrid');grid.innerHTML='';
  for(let q=1;q<=numQ;q++){
    const g=document.createElement('div');g.className='answer-group';
    const qn=document.createElement('div');qn.className='qnum';qn.textContent=q+'.';g.appendChild(qn);
    const opts=document.createElement('div');opts.className='opts';
    for(let i=0;i<numOpts;i++){
      const lbl=ALPHA[i];
      const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=lbl;
      applyBtnStyle(btn,(answers[q]&&answers[q][lbl])||0);
      btn.addEventListener('click',()=>{
        if(!answers[q])answers[q]={};
        const c=answers[q][lbl]||0,next=(c+1)%4;
        if(next===0)delete answers[q][lbl];else answers[q][lbl]=next;
        if(Object.keys(answers[q]).length===0)delete answers[q];
        applyBtnStyle(btn,next);recalcInfo();
      });
      opts.appendChild(btn);
    }
    g.appendChild(opts);grid.appendChild(g);
  }
  recalcInfo();
}
function recalcInfo(){
  let yakin=0,ragu=0,total=Object.keys(answers).length;
  for(const q in answers){if(Object.values(answers[q]).some(s=>s>=2))ragu++;else yakin++;}
  document.getElementById('answeredCount').textContent=yakin;
  document.getElementById('doubtCount').textContent=ragu;
  document.getElementById('unansweredCount').textContent=numQ-total;
}
document.getElementById('generateBtn').addEventListener('click',()=>{
  numQ=Math.max(1,Math.min(200,parseInt(document.getElementById('numQ').value)||50));
  numOpts=Math.max(2,Math.min(6,parseInt(document.getElementById('numOpts').value)||4));
  answers={};buildGrid();
});
document.getElementById('resetBtn').addEventListener('click',()=>{answers={};buildGrid();});
buildGrid();
</script>
